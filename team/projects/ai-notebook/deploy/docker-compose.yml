version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:./data/dev.db
      - KIMI_API_KEY=${KIMI_API_KEY}
      - PORT=3001
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
